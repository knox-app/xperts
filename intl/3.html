<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Picture</title>
    <style>
        body { background-color: #0e0e0e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        img { max-width: 100%; max-height: 100%; display: block; user-select: none; }
    </style>
</head>
<body>
    <div id="imgContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <script>
        const docId = localStorage.getItem("userDocId");
        if(!docId) window.location.href = "1.html";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("Accounts").doc(docId).get().then(doc => {
            if (doc.exists) {
                const imgUrl = doc.data()['Profile Picture'];
                document.getElementById('imgContainer').innerHTML = `<img src="${imgUrl}">`;
            }
        });
    </script>
</body>
</html>
