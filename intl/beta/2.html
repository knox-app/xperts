<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xperts Dashboard</title>

<style>
body{
    background:#0f172a;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}
.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
}
.batch{
    background:#334155;
    padding:10px;
    border-radius:8px;
    margin:5px 0;
}
button{
    background:#ef4444;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Dashboard</h2>
    <div id="onesignalStatus">Connecting...</div>
</div>

<div class="card">
    <h3>Your Batches</h3>
    <div id="batchList"></div>
</div>

<button onclick="logout()">Logout</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- YOUR FIREBASE CONFIG -->
<script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userDocId = localStorage.getItem("userDocId");

const batches =
JSON.parse(localStorage.getItem("userBatches") || "[]");

const batchList =
document.getElementById("batchList");

batches.forEach(batch=>{
    batchList.innerHTML +=
    `<div class="batch">${batch}</div>`;
});
</script>

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>

window.OneSignalDeferred =
window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal){

    try{

        await OneSignal.init({
            appId:"YOUR_ONESIGNAL_APP_ID"
        });

        document.getElementById("onesignalStatus")
        .innerHTML = "OneSignal Connected";

        setTimeout(async ()=>{

            const subscriptionId =
            OneSignal.User.PushSubscription.id;

            console.log(subscriptionId);

            if(subscriptionId && userDocId){

                await db.collection("Accounts")
                .doc(userDocId)
                .update({
                    OneSignalId: subscriptionId
                });

                document.getElementById("onesignalStatus")
                .innerHTML =
                "✅ OneSignal ID Saved";

            }

        },5000);

    }catch(err){

        console.error(err);

        document.getElementById("onesignalStatus")
        .innerHTML =
        "❌ " + err.message;

    }

});

function logout(){
    localStorage.clear();
    location.href="1.html";
}
</script>

</body>
</html>
