<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.batch{
    background:#e8f0ff;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Dashboard</h2>
    <div id="name"></div>
    <div id="class"></div>
</div>

<div class="card">
    <h3>Your Batches</h3>
    <div id="batches"></div>
</div>

<div class="card">
    <h3>OneSignal Status</h3>
    <div id="status">Starting...</div>
</div>

<button onclick="logout()">Logout</button>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>

const userData =
JSON.parse(localStorage.getItem("userData") || "{}");

const batches =
JSON.parse(localStorage.getItem("userBatches") || "[]");

if(!localStorage.getItem("userDocId")){
    location.href="1.html";
}

document.getElementById("name").innerHTML =
"<b>Name:</b> " + (userData["Full Name"] || "");

document.getElementById("class").innerHTML =
"<b>Class:</b> " + (userData["Class"] || "");

const batchContainer =
document.getElementById("batches");

if(batches.length===0){
    batchContainer.innerHTML =
    "No batches found";
}else{
    batches.forEach(batch=>{
        batchContainer.innerHTML +=
        `<div class="batch">${batch}</div>`;
    });
}

window.OneSignalDeferred =
window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal){

    try{

        await OneSignal.init({
            appId:"c842fd36-4de9-47e7-b7f6-74a75dc83445"
        });

        document.getElementById("status").innerHTML =
        "OneSignal Connected<br>";

        // Test Tag
        await OneSignal.User.addTags({
            test_batch:"true"
        });

        // Batch Tags
        const tagObject = {};

        batches.forEach(batch=>{
            tagObject[batch] = "true";
        });

        if(Object.keys(tagObject).length > 0){
            await OneSignal.User.addTags(tagObject);
        }

        document.getElementById("status").innerHTML =
        "✅ Tags Synced Successfully<br>" +
        "Tags Added: " +
        JSON.stringify(tagObject);

    }catch(error){

        console.error(error);

        document.getElementById("status").innerHTML =
        "❌ Error<br>" +
        error.message;

    }

});

function logout(){
    localStorage.clear();
    location.href="1.html";
}

</script>

</body>
</html>
