<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Video Player</title>
    <!-- Material Icons for professional UI -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050b14;
            --sidebar-bg: #0a192f;
            --panel-bg: #112240;
            --accent-color: #64ffda;
            --text-main: #ccd6f6;
            --text-muted: #8892b0;
            --control-bg: rgba(10, 25, 47, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar (Left Side) --- */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--panel-bg);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .header-info {
            margin-bottom: 30px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-main);
        }

        .chapters-container {
            flex-grow: 1;
            overflow-y: auto;
        }

        .chapters-container::-webkit-scrollbar { width: 6px; }
        .chapters-container::-webkit-scrollbar-thumb { background: var(--panel-bg); border-radius: 4px; }

        .chapter-heading {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chapter-item {
            display: flex;
            gap: 12px;
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 5px;
        }

        .chapter-item:hover, .chapter-item.active {
            background-color: var(--panel-bg);
        }

        .chapter-time {
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 45px;
        }

        .chapter-title {
            font-size: 0.9rem;
            color: var(--text-main);
        }

        /* --- Main Video Area --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            pointer-events: none; /* Prevents clicking standard YT UI if it flashes */
        }

        #yt-player {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Prevent interaction with invisible YT iframe */
        .click-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            z-index: 5;
            cursor: pointer;
        }

        /* --- Custom Controls --- */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--control-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            border-radius: 3px;
            width: 0%;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -4px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: 0.2s;
        }

        .progress-container:hover .progress-bar::after { opacity: 1; }

        /* Control Buttons */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn:hover { color: var(--accent-color); }
        .material-symbols-rounded { font-size: 28px; }

        .time-display {
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .volume-slider {
            width: 80px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* Dropdowns (Speed & Quality) */
        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            font-size: 0.9rem;
            font-weight: 600;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sidebar-bg);
            border: 1px solid var(--panel-bg);
            border-radius: 6px;
            overflow: hidden;
            flex-direction: column-reverse;
        }

        .dropdown:hover .dropdown-content { display: flex; }

        .dropdown-content button {
            background: none;
            border: none;
            color: var(--text-main);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .dropdown-content button:hover, .dropdown-content button.active {
            background: var(--panel-bg);
            color: var(--accent-color);
        }

        /* Fullscreen modifications */
        body.fullscreen-mode .sidebar { display: none; }
        
        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="header-info">
            <div class="subtitle" id="ui-subtitle">Loading Subject...</div>
            <div class="title" id="ui-title">Loading Video Details...</div>
        </div>
        
        <div class="chapter-heading">
            <span class="material-symbols-rounded" style="font-size: 20px;">format_list_bulleted</span>
            Video Chapters
        </div>
        <div class="chapters-container" id="chapters-list">
            <!-- Chapters injected here -->
        </div>
    </aside>

    <!-- Main Video -->
    <main class="main-content" id="main-content">
        <div id="error-msg">Invalid YouTube URL or Parameters provided.</div>
        
        <div class="video-wrapper">
            <div id="yt-player"></div>
        </div>
        <div class="click-shield" onclick="togglePlay()"></div>

        <!-- Custom Controls -->
        <div class="custom-controls" id="custom-controls">
            <div class="progress-container" id="progress-container" onclick="seekVideo(event)">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <button class="btn" id="play-pause-btn" onclick="togglePlay()" title="Play (k)">
                        <span class="material-symbols-rounded">play_arrow</span>
                    </button>
                    
                    <div class="volume-container">
                        <button class="btn" id="mute-btn" onclick="toggleMute()" title="Mute (m)">
                            <span class="material-symbols-rounded">volume_up</span>
                        </button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
                    </div>

                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                    </div>
                </div>

                <div class="control-group">
                    <!-- Playback Speed -->
                    <div class="dropdown">
                        <button class="dropdown-btn" id="speed-btn">1x</button>
                        <div class="dropdown-content" id="speed-menu">
                            <button onclick="changeSpeed(0.5)">0.5x</button>
                            <button onclick="changeSpeed(0.75)">0.75x</button>
                            <button onclick="changeSpeed(1)" class="active">Normal</button>
                            <button onclick="changeSpeed(1.25)">1.25x</button>
                            <button onclick="changeSpeed(1.5)">1.5x</button>
                            <button onclick="changeSpeed(2)">2x</button>
                        </div>
                    </div>

                    <!-- Quality (Note: YT API sets quality to Auto by default, manual setting is deprecated by YT, but UI is provided) -->
                    <div class="dropdown">
                        <button class="dropdown-btn" id="quality-btn">Auto</button>
                        <div class="dropdown-content" id="quality-menu">
                            <button onclick="changeQuality('highres')">1080p</button>
                            <button onclick="changeQuality('hd720')">720p</button>
                            <button onclick="changeQuality('large')">480p</button>
                            <button onclick="changeQuality('auto')" class="active">Auto</button>
                        </div>
                    </div>

                    <button class="btn" onclick="toggleFullscreen()" title="Fullscreen (f)">
                        <span class="material-symbols-rounded" id="fullscreen-icon">fullscreen</span>
                    </button>
                </div>
            </div>
        </main>
    </main>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        // API KEY PROVIDED BY USER
        const API_KEY = 'AIzaSyCppNrlt-azXha6F_fIxUjFRqqAH3NtvQE';

        let player;
        let videoDuration = 0;
        let progressInterval;
        let chaptersData = [];

        // 1. URL Parsing
        const urlParams = new URLSearchParams(window.location.search);
        const ytUrl = urlParams.get('topic');
        const subject = urlParams.get('sub');

        document.getElementById('ui-subtitle').innerText = subject || "Educational Video";

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url?.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        const videoId = extractVideoID(ytUrl);

        if (!videoId) {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('custom-controls').style.display = 'none';
        }

        // 2. Fetch Video Data & Chapters
        async function fetchVideoDetails(id) {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${API_KEY}`);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const snippet = data.items[0].snippet;
                    document.getElementById('ui-title').innerText = snippet.title;
                    parseChapters(snippet.description);
                }
            } catch (error) {
                console.error("Error fetching video details:", error);
                document.getElementById('ui-title').innerText = "Video Title Unavailable";
            }
        }

        function parseChapters(description) {
            // Regex to find timestamps like 0:00, 01:23, 1:02:30 followed by text
            const chapterRegex = /((?:\d{1,2}:)?\d{1,2}:\d{2})\s+(.+)/g;
            let match;
            const container = document.getElementById('chapters-list');
            container.innerHTML = '';

            while ((match = chapterRegex.exec(description)) !== null) {
                const timeStr = match[1];
                const titleStr = match[2];
                const seconds = timeToSeconds(timeStr);
                
                chaptersData.push({ time: seconds, title: titleStr, element: null });

                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter-item';
                chapterDiv.innerHTML = `
                    <div class="chapter-time">${timeStr}</div>
                    <div class="chapter-title">${titleStr}</div>
                `;
                chapterDiv.onclick = () => {
                    player.seekTo(seconds, true);
                    player.playVideo();
                };
                
                chaptersData[chaptersData.length - 1].element = chapterDiv;
                container.appendChild(chapterDiv);
            }

            if(chaptersData.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); padding:10px;">No chapters found.</div>';
            }
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').reverse();
            let seconds = 0;
            for (let i = 0; i < parts.length; i++) {
                seconds += parseInt(parts[i]) * Math.pow(60, i);
            }
            return seconds;
        }

        if(videoId) fetchVideoDetails(videoId);

        // 3. Initialize YouTube Player (Chromeless)
        function onYouTubeIframeAPIReady() {
            if(!videoId) return;

            player = new YT.Player('yt-player', {
                videoId: videoId,
                playerVars: {
                    'controls': 0,        // Hide native controls
                    'disablekb': 1,       // Disable native keyboard shortcuts
                    'modestbranding': 1,  // Hide YT logo
                    'rel': 0,             // No related videos
                    'showinfo': 0,
                    'iv_load_policy': 3,  // Hide annotations
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            videoDuration = player.getDuration();
            document.getElementById('total-time').innerText = formatTime(videoDuration);
            updateProgressBar();
            
            // Check if it's a live stream (Duration is 0 or very small in API for live)
            if(videoDuration === 0) {
                document.getElementById('total-time').innerText = "LIVE";
                document.getElementById('progress-container').style.display = 'none';
            }
        }

        function onPlayerStateChange(event) {
            const playBtn = document.getElementById('play-pause-btn');
            
            if (event.data == YT.PlayerState.PLAYING) {
                playBtn.innerHTML = '<span class="material-symbols-rounded">pause</span>';
                progressInterval = setInterval(updateProgressBar, 500);
            } else {
                playBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>';
                clearInterval(progressInterval);
            }
        }

        // 4. Custom Controls Logic
        function togglePlay() {
            if (player.getPlayerState() == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function updateProgressBar() {
            if(videoDuration === 0) return; // Skip for Live streams
            
            const currentTime = player.getCurrentTime();
            const percent = (currentTime / videoDuration) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('current-time').innerText = formatTime(currentTime);

            // Highlight active chapter
            for (let i = 0; i < chaptersData.length; i++) {
                const nextTime = chaptersData[i + 1] ? chaptersData[i + 1].time : videoDuration;
                if (currentTime >= chaptersData[i].time && currentTime < nextTime) {
                    chaptersData.forEach(c => c.element.classList.remove('active'));
                    chaptersData[i].element.classList.add('active');
                }
            }
        }

        function seekVideo(event) {
            const container = document.getElementById('progress-container');
            const rect = container.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            const seekTime = percent * videoDuration;
            player.seekTo(seekTime, true);
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "00:00";
            const date = new Date(seconds * 1000);
            const hh = date.getUTCHours();
            const mm = date.getUTCMinutes();
            const ss = date.getUTCSeconds().toString().padStart(2, '0');
            if (hh) return `${hh}:${mm.toString().padStart(2, '0')}:${ss}`;
            return `${mm.toString().padStart(2, '0')}:${ss}`;
        }

        function toggleMute() {
            const muteBtn = document.getElementById('mute-btn');
            const slider = document.getElementById('volume-slider');
            if (player.isMuted()) {
                player.unMute();
                muteBtn.innerHTML = '<span class="material-symbols-rounded">volume_up</span>';
                slider.value = player.getVolume();
            } else {
                player.mute();
                muteBtn.innerHTML = '<span class="material-symbols-rounded">volume_off</span>';
                slider.value = 0;
            }
        }

        function changeVolume(val) {
            player.unMute();
            player.setVolume(val);
            const muteBtn = document.getElementById('mute-btn');
            muteBtn.innerHTML = val == 0 ? '<span class="material-symbols-rounded">volume_off</span>' : '<span class="material-symbols-rounded">volume_up</span>';
        }

        function changeSpeed(rate) {
            player.setPlaybackRate(rate);
            document.getElementById('speed-btn').innerText = rate === 1 ? 'Normal' : rate + 'x';
            
            // Update active state in UI
            const btns = document.querySelectorAll('#speed-menu button');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function changeQuality(quality) {
            player.setPlaybackQuality(quality); // Note: YouTube mostly auto-manages this now, but API method is triggered.
            document.getElementById('quality-btn').innerText = event.target.innerText;
            
            const btns = document.querySelectorAll('#quality-menu button');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleFullscreen() {
            const elem = document.body;
            const icon = document.getElementById('fullscreen-icon');

            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
                icon.innerText = 'fullscreen_exit';
                document.body.classList.add('fullscreen-mode');
            } else {
                document.exitFullscreen();
                icon.innerText = 'fullscreen';
                document.body.classList.remove('fullscreen-mode');
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if(e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
            if(e.key === 'm') toggleMute();
            if(e.key === 'f') toggleFullscreen();
            if(e.key === 'ArrowRight') player.seekTo(player.getCurrentTime() + 5, true);
            if(e.key === 'ArrowLeft') player.seekTo(player.getCurrentTime() - 5, true);
        });

    </script>
</body>
</html>
