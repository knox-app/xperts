<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamStudio Pro</title>
    
    <!-- CDNs: Google OAuth, Jitsi, and Firebase Realtime Database -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09090e 0%, #12121c 100%);
            --card-bg: rgba(26, 26, 38, 0.7);
            --primary-color: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.4);
            --accent-color: #ff007f;
            --accent-glow: rgba(255, 0, 127, 0.4);
            --text-color: #f1f1f6;
            --text-secondary: #8e8ea8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            background: rgba(18, 18, 28, 0.8);
            backdrop-filter: blur(12px);
            padding: 18px 30px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        header h2 {
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 92%;
            max-width: 850px;
            margin: 30px 0;
        }

        .box {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
        }

        h3 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Modern Gradient Buttons */
        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #09090e;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff0844, #ffb199);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(37, 37, 53, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-color);
            border-radius: 10px;
            margin-top: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Glowing Live Dot */
        .pulse-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--accent-color); }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Embedded Jitsi Box */
        #jitsi-container {
            width: 100%;
            height: 520px;
            background-color: #050508;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <header>
        <h2>STREAMSTUDIO PRO</h2>
    </header>

    <div class="container">
        
        <div class="box">
            <!-- STEP 1: GOOGLE AUTH -->
            <div id="login-section">
                <h3>Authorize Streaming</h3>
                <p>Connect your YouTube account to load stream tokens directly inside the browser studio.</p>
                <button onclick="handleGoogleLogin()">Log In with Google</button>
            </div>

            <!-- STEP 2: SETUP PANEL -->
            <div id="setup-section" style="display: none;">
                <h3>Stream Settings</h3>
                <p>Adjust your title and safety settings before broadcasting.</p>
                <div class="input-group">
                    <label>Broadcast Title</label>
                    <input type="text" id="stream-title" placeholder="e.g. Science Revision Live Class">
                </div>
                <div class="input-group">
                    <label>Privacy Setting</label>
                    <select id="stream-visibility">
                        <option value="unlisted" selected>Unlisted (Only app users can watch)</option>
                        <option value="public">Public (Everyone on YT can watch)</option>
                        <option value="private">Private (Only you can watch)</option>
                    </select>
                </div>
                <button onclick="startDirectStream()">Go Live Now</button>
            </div>

            <!-- STEP 3: RUNNING STREAM -->
            <div id="active-section" style="display: none;">
                <h3 id="active-title" style="color: var(--primary-color);">Broadcasting Event</h3>
                <p style="color: var(--accent-color); font-weight: 700; display: flex; align-items: center; justify-content: center;">
                    <span class="pulse-dot"></span> LIVE BROADCAST ACTIVE (Wait 10-15s for YouTube synchronization)
                </p>
                <div id="jitsi-container"></div>
                <button onclick="stopDirectStream()" class="btn-danger" style="margin-top: 25px;">Stop Broadcast</button>
            </div>
        </div>

    </div>

    <script>
        const CLIENT_ID = '878851646059-df1b22bspju27a2gjb4o9n4mrtpo7kkr.apps.googleusercontent.com';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDPm2za3Ho0Hd8Henuhq0KxAHyUQh-Hi-U",
            authDomain: "question-metabase.firebaseapp.com",
            databaseURL: "https://question-metabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "question-metabase",
            storageBucket: "question-metabase.firebasestorage.app",
            messagingSenderId: "770698198753",
            appId: "1:770698198753:web:59ae49d78b6013bab5c1a0",
            measurementId: "G-6ZP1FPMKSJ"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tokenClient;
        let accessToken = localStorage.getItem('yt_access_token');
        let currentBroadcastId = null;
        let currentStreamId = null;
        let jitsiAPI = null;
        let currentDbKey = null;

        window.onload = function() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        localStorage.setItem('yt_access_token', accessToken);
                        showSetupSection();
                    }
                }
            });

            if (accessToken) {
                showSetupSection();
            }
        };

        function handleGoogleLogin() {
            tokenClient.requestAccessToken();
        }

        function showSetupSection() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('setup-section').style.display = 'block';
        }

        async function startDirectStream() {
            const title = document.getElementById('stream-title').value;
            const visibility = document.getElementById('stream-visibility').value;

            if(!title) return alert("Please specify a stream title.");

            document.getElementById('setup-section').style.display = 'none';
            alert("Creating secure stream connection. Please hold...");

            try {
                // 1. Create broadcast on YT (Set to Auto Start/Stop)
                const broadcastRes = await fetch('https://www.googleapis.com/youtube/v3/liveBroadcasts?part=snippet,status,contentDetails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        snippet: { title: title, scheduledStartTime: new Date().toISOString() },
                        status: { privacyStatus: visibility, selfDeclaredMadeForKids: false },
                        contentDetails: {
                            enableAutoStart: true,
                            enableAutoStop: true
                        }
                    })
                });
                const broadcastData = await broadcastRes.json();
                currentBroadcastId = broadcastData.id;

                // 2. Create Live Stream Pipe
                const streamRes = await fetch('https://www.googleapis.com/youtube/v3/liveStreams?part=snippet,cdn', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        snippet: { title: title + " stream" },
                        cdn: { frameRate: "variable", ingestionType: "rtmp", resolution: "variable" }
                    })
                });
                const streamData = await streamRes.json();
                currentStreamId = streamData.id;
                const streamKey = streamData.cdn.ingestionInfo.streamName;

                // 3. Link Stream to Broadcast
                await fetch(`https://www.googleapis.com/youtube/v3/liveBroadcasts/bind?id=${currentBroadcastId}&part=id,contentDetails&streamId=${currentStreamId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                // 4. Update Firebase
                const newStreamRef = db.ref('classes').push();
                currentDbKey = newStreamRef.key;
                await newStreamRef.set({
                    title: title,
                    videoId: currentBroadcastId,
                    status: "live",
                    date: new Date().toLocaleDateString()
                });

                // 5. Run Jitsi Frame
                runJitsiIframe(title, streamKey);

            } catch (err) {
                console.error(err);
                alert("Session Expired or Connection Lost. Re-authorizing account...");
                localStorage.removeItem('yt_access_token');
                location.reload();
            }
        }

        function runJitsiIframe(title, streamKey) {
            document.getElementById('active-title').innerText = title;
            document.getElementById('active-section').style.display = 'block';

            const domain = "meet.jit.si";
            const options = {
                roomName: "DirectLiveHub_" + Math.random().toString(36).substring(7),
                width: "100%",
                height: 520,
                parentNode: document.querySelector('#jitsi-container'),
                
                // MOBILE DEEP LINKING BYPASS ENABLED
                configOverwrite: { 
                    startWithAudioMuted: false,
                    disableDeepLinking: true // Bypasses mobile landing app screen
                },
                
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'hangup'] }
            };

            jitsiAPI = new JitsiMeetExternalAPI(domain, options);

            jitsiAPI.addEventListener('videoConferenceJoined', () => {
                setTimeout(() => {
                    // Send Jitsi Video feed directly to YouTube RTMP Key
                    jitsiAPI.executeCommand('startRecording', {
                        mode: 'stream',
                        rtmpStreamKey: streamKey
                    });
                }, 4000); 
            });
        }

        async function stopDirectStream() {
            if(!confirm("Are you sure you want to end this live broadcast?")) return;

            if(jitsiAPI) {
                jitsiAPI.executeCommand('stopRecording', { mode: 'stream' });
                jitsiAPI.dispose();
            }

            if(currentDbKey) {
                await db.ref('classes/' + currentDbKey).update({
                    status: "recorded"
                });
            }

            alert("Broadcast concluded successfully!");
            document.getElementById('active-section').style.display = 'none';
            document.getElementById('setup-section').style.display = 'block';
        }
    </script>
</body>
</html>
