<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Uploader</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
    font-family:Inter,sans-serif;
    max-width:700px;
    margin:20px auto;
    padding:20px;
}
input,textarea,select,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}
#progress{
    width:100%;
    height:20px;
}
</style>
</head>
<body>

<h2>YouTube Video Uploader</h2>

<button id="loginBtn">Login with Google</button>

<div id="uploader" style="display:none">

<input id="title" placeholder="Video Title">

<textarea id="description" placeholder="Description"></textarea>

<select id="privacy">
    <option value="public">Public</option>
    <option value="unlisted">Unlisted</option>
    <option value="private">Private</option>
</select>

<input type="file" id="videoFile" accept="video/*">

<button id="uploadBtn">Upload Video</button>

<br><br>

<progress id="progress" value="0" max="100"></progress>

<p id="status"></p>

</div>

<script>

const CLIENT_ID = "878851646059-67inc8f539i7n1a2vo1qtga3dl6gagn9.apps.googleusercontent.com";

const SCOPES =
"https://www.googleapis.com/auth/youtube.upload";

let accessToken = "";

document.getElementById("loginBtn").onclick = () => {

google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (tokenResponse) => {

        accessToken = tokenResponse.access_token;

        document.getElementById("uploader").style.display = "block";

        document.getElementById("status").innerText =
        "Logged In";
    }
}).requestAccessToken();

};

document.getElementById("uploadBtn").onclick = async () => {

const file =
document.getElementById("videoFile").files[0];

if(!file){
    alert("Select video");
    return;
}

const metadata = {
    snippet:{
        title:document.getElementById("title").value,
        description:
        document.getElementById("description").value
    },
    status:{
        privacyStatus:
        document.getElementById("privacy").value
    }
};

const initUpload = await fetch(
"https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
{
    method:"POST",
    headers:{
        Authorization:`Bearer ${accessToken}`,
        "Content-Type":"application/json"
    },
    body:JSON.stringify(metadata)
});

const uploadUrl =
initUpload.headers.get("Location");

const xhr = new XMLHttpRequest();

xhr.open("PUT", uploadUrl, true);

xhr.upload.onprogress = (e)=>{
    if(e.lengthComputable){
        const percent =
        (e.loaded/e.total)*100;

        document.getElementById("progress")
        .value = percent;
    }
};

xhr.onload = ()=>{

    if(xhr.status === 200 ||
       xhr.status === 201){

        const res =
        JSON.parse(xhr.responseText);

        document.getElementById("status")
        .innerHTML =
        `Uploaded! Video ID: ${res.id}
        <br>
        https://youtube.com/watch?v=${res.id}`;

    }else{

        document.getElementById("status")
        .innerText = "Upload Failed";

    }
};

xhr.send(file);

};

</script>

</body>
</html>
