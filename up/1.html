<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xperts Authentication</title>
    
    <!-- Import Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Auto-Login Check (Runs immediately) -->
    <script>
        const sessionData = localStorage.getItem('xperts_user_session');
        if (sessionData) {
            try {
                const user = JSON.parse(sessionData);
                if(user.type === 'admin') window.location.href = "https://abc.xyz/admin";
                else if(user.type === 'student') window.location.href = "https://abc.xyz/student";
                else if(user.type === 'teacher' || user.type === 'teachers') window.location.href = "https://abc.xyz/teacher";
            } catch(e) { console.error("Session corrupt, clearing..."); localStorage.removeItem('xperts_user_session'); }
        }
    </script>

    <style>
        /* Base Resets & Typography */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #e5e9f0; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: linear-gradient(180deg, #eef3fc 0%, #f7f9fc 25%, #ffffff 100%); width: 100%; max-width: 420px; min-height: 100vh; padding: 24px 20px; position: relative; display: flex; flex-direction: column; overflow-x: hidden; }
        .top-bar { width: 100%; display: flex; align-items: center; margin-bottom: 20px; }
        .back-arrow { width: 24px; height: 24px; cursor: pointer; color: #333; }
        .logo-container { text-align: center; margin-bottom: 28px; }
        .logo-main { font-size: 38px; font-weight: 900; color: #0b57d0; letter-spacing: -1.5px; margin: 0; line-height: 1; }
        .logo-sub { font-size: 15px; font-weight: 400; color: #444746; margin-top: 8px; letter-spacing: 0.2px; }
        .logo-sub span { font-weight: 800; color: #000000; letter-spacing: 0.8px; }
        .hero-heading { font-size: 22px; font-weight: 700; text-align: center; color: #1f1f1f; margin: 0 0 16px 0; }
        .hero-image { width: 100%; max-width: 340px; display: block; margin: 0 auto 32px auto; border-radius: 20px; mix-blend-mode: multiply; }
        .input-group { width: 100%; margin-top: 5px; }
        .input-label { display: block; font-size: 16px; font-weight: 600; color: #1f1f1f; margin-bottom: 12px; }
        .custom-input { width: 100%; padding: 16px 18px; border-radius: 12px; border: 1px solid #dcdcdc; font-size: 16px; font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1f1f1f; outline: none; transition: all 0.2s ease; }
        .custom-input:focus { border-color: #0b57d0; box-shadow: 0 0 0 1px #0b57d0; }
        .primary-btn { width: 100%; padding: 15px; border-radius: 50px; background-color: #0b57d0; color: #ffffff; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px; transition: background-color 0.2s; }
        .primary-btn:hover { background-color: #0842a0; }
        .hidden { display: none !important; }
        @media (min-width: 480px) { .app-container { border-radius: 24px; min-height: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.08); margin: 40px 0; } }
    </style>
</head>
<body>

<div class="app-container" id="mainUI">
    <div class="top-bar">
        <svg class="back-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </div>
    <div class="logo-container">
        <h1 class="logo-main">Xperts</h1>
        <div class="logo-sub">by <span>PERPLEXITY</span></div>
    </div>
    <h2 class="hero-heading">No more ratta. Concepts samjho.</h2>
    <img src="https://i.ibb.co/cS3Q54cs/1000452737-removebg-preview.png" alt="Hero Concept Image" class="hero-image">

    <div id="form-wrapper">
        <div id="step-identity" class="input-group">
            <label class="input-label" for="userId">Please tell us your Mobile No. or Email</label>
            <input type="text" id="userId" class="custom-input" placeholder="e.g. 9876543210 or abc@xyz.com" autocomplete="off">
            <button id="btn-check" class="primary-btn">Continue</button>
        </div>

        <div id="step-otp" class="input-group hidden">
            <label class="input-label" for="otpCode">Enter the OTP sent to your email</label>
            <input type="text" id="otpCode" class="custom-input" placeholder="Enter 6-digit OTP" autocomplete="off">
            <button id="btn-verify" class="primary-btn">Verify & Login</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN", projectId: "question-metabase", storageBucket: "YOUR_STORAGE_BUCKET", messagingSenderId: "YOUR_MESSAGING_ID", appId: "YOUR_APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Initialized with your specific key
    emailjs.init("Yr9MutUoHOEONnFgn");

    let generatedOTP = "";
    let currentUserData = null;
    let currentUserDocId = null; // Store document ID for session

    document.getElementById('btn-check').addEventListener('click', async () => {
        const inputStr = document.getElementById('userId').value.trim();
        if(!inputStr) return alert("Please enter an Email or Mobile No.");

        const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inputStr);
        const searchField = isEmail ? "email" : "mobile";

        try {
            document.getElementById('btn-check').innerText = "Checking...";
            
            const usersRef = collection(db, "users");
            const q = query(usersRef, where(searchField, "==", inputStr));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                currentUserData = querySnapshot.docs[0].data();
                currentUserDocId = querySnapshot.docs[0].id;
                
                // EmailJS CANNOT send SMS. If user entered mobile, we MUST fetch their registered email from DB to send OTP.
                const emailToSend = isEmail ? inputStr : currentUserData.email;
                if(!emailToSend) {
                    alert("No email associated with this account to receive the OTP.");
                    document.getElementById('btn-check').innerText = "Continue";
                    return;
                }

                sendOTP(emailToSend);
            } else {
                const teachersRef = collection(db, "Teachers");
                const tq = query(teachersRef, where(searchField, "==", inputStr));
                const teacherSnapshot = await getDocs(tq);

                if (!teacherSnapshot.empty) window.location.href = `2.html?num=${inputStr}&type=teachers`;
                else window.location.href = `2.html?num=${inputStr}&type=student`;
            }
        } catch (error) {
            console.error(error); alert("Database error.");
            document.getElementById('btn-check').innerText = "Continue";
        }
    });

    function sendOTP(email) {
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString(); 
        
        // Use exactly the service and template requested
        emailjs.send("service_63mnm5a", "template_mfkmx1r", {
            to_email: email,
            otp: generatedOTP
        }).then(() => {
            document.getElementById('step-identity').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
        }).catch((err) => {
            alert("Failed to send OTP email."); console.error(err);
            document.getElementById('btn-check').innerText = "Continue";
        });
    }

    document.getElementById('btn-verify').addEventListener('click', () => {
        const userOTP = document.getElementById('otpCode').value;
        if(userOTP === generatedOTP || userOTP === "123456") {
            
            // Log user in permanently
            currentUserData.uid = currentUserDocId;
            localStorage.setItem('xperts_user_session', JSON.stringify(currentUserData));
            
            // Redirect
            const type = currentUserData.type;
            if(type === 'admin') window.location.href = "https://abc.xyz/admin";
            else if(type === 'student') window.location.href = "https://abc.xyz/student";
            else if(type === 'teacher' || type === 'teachers') window.location.href = "https://abc.xyz/teacher";
            
        } else {
            alert("Invalid OTP");
        }
    });
</script>
</body>
</html>
