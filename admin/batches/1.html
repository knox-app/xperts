<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Institute Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Your Firebase Config File -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!-- Login UI -->
    <div id="loginSection" class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-4 text-center">Institute Login</h2>
        <input type="text" id="adminIdInput" placeholder="Enter Institute ID" class="w-full p-2 border rounded mb-4">
        <button onclick="checkLogin()" id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded">Verify ID</button>
    </div>

    <!-- Generator UI (Hidden by default) -->
    <div id="adminPanel" class="hidden bg-white p-8 rounded-lg shadow-md w-96">
        <h2 id="welcomeText" class="text-xl font-bold mb-4 text-blue-600"></h2>
        
        <label class="block mb-1 text-sm font-medium">Select Batch</label>
        <select id="batchSelect" class="w-full p-2 border rounded mb-4">
            <!-- Batches will load here from Firestore -->
            <option value="">Loading Batches...</option>
        </select>

        <label class="block mb-1 text-sm font-medium">Validity Date</label>
        <input type="date" id="validity" class="w-full p-2 border rounded mb-4">

        <label class="block mb-1 text-sm font-medium">Usage Limit</label>
        <input type="number" id="usageLimit" value="1" min="1" class="w-full p-2 border rounded mb-4">

        <button onclick="generateAndSaveCoupon()" class="w-full bg-green-600 text-white py-2 rounded font-bold">Generate & Save Coupon</button>
        
        <div id="result" class="mt-4 p-3 bg-yellow-100 border border-yellow-300 rounded hidden break-all font-mono text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to check if ID exists in 'Institutes' collection
        window.checkLogin = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = document.getElementById('adminIdInput').value || urlParams.get('id');

            if(!id) return alert("Please enter an ID");

            const btn = document.getElementById('loginBtn');
            btn.innerText = "Verifying...";

            try {
                const instRef = doc(db, "Institutes", id);
                const instSnap = await getDoc(instRef);

                if (instSnap.exists()) {
                    const data = instSnap.data();
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('welcomeText').innerText = "Welcome, " + data['Full Name'];
                    loadBatches();
                } else {
                    alert("Invalid Admin ID: " + id);
                    btn.innerText = "Verify ID";
                }
            } catch (e) {
                console.error(e);
                alert("Error connecting to database");
            }
        };

        // Load Batches from your 'Batches' collection
        async function loadBatches() {
            const batchSelect = document.getElementById('batchSelect');
            const querySnapshot = await getDocs(collection(db, "Batches"));
            batchSelect.innerHTML = ""; // Clear loader
            querySnapshot.forEach((doc) => {
                let option = document.createElement("option");
                option.value = doc.id;
                option.text = doc.id; // Or doc.data().name if available
                batchSelect.appendChild(option);
            });
        }

        // Coupon Logic
        window.generateAndSaveCoupon = async function() {
            const batch = document.getElementById('batchSelect').value;
            const validity = document.getElementById('validity').value;
            const limit = document.getElementById('usageLimit').value;

            if(!validity) return alert("Select Validity Date");

            // Format: <4 DIGIT>XPRT<2 ALPHA>CC<4 ALPHANUMERIC>
            const d4 = Math.floor(1000 + Math.random() * 9000);
            const a2 = Array.from({length: 2}, () => String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');
            const an4 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const couponCode = `${d4}XPRT${a2}CC${an4}`;

            try {
                // Saving into 'coupons' collection
                await setDoc(doc(db, "coupons", couponCode), {
                    code: couponCode,
                    batchId: batch,
                    validity: validity,
                    maxUsage: parseInt(limit),
                    usedCount: 0
                });

                const resDiv = document.getElementById('result');
                resDiv.innerText = "COUPON: " + couponCode;
                resDiv.classList.remove('hidden');
                alert("Coupon Generated Successfully!");
            } catch (e) {
                alert("Error saving coupon");
            }
        };

        // Auto-run if ID is in URL
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('id')) {
            document.getElementById('adminIdInput').value = urlParams.get('id');
            checkLogin();
        }
    </script>
</body>
</html>
