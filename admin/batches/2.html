<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enrolling...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
    <style>
        body, html { height: 100%; overflow: hidden; margin: 0; }
        
        /* Animation Classes */
        .cert-fly {
            animation: flyIn 1.5s ease-in-out forwards;
        }
        
        .bag-bounce {
            animation: bounce 0.5s ease-in-out 1.2s;
        }

        .check-draw {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 0.6s ease-out 1.8s forwards;
        }

        @keyframes flyIn {
            0% { transform: translateY(-150px) scale(1); opacity: 0; }
            50% { transform: translateY(0px) scale(1.1); opacity: 1; }
            100% { transform: translateY(40px) scale(0); opacity: 0; }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 2.2s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-blue-600 font-sans">

    <!-- Loading Overlay -->
    <div id="loaderScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-600 border-solid mx-auto mb-4"></div>
            <p class="text-gray-600 font-medium">Securing your seat...</p>
        </div>
    </div>

    <!-- Main Full Screen App UI -->
    <div id="appScreen" class="hidden fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
        
        <!-- Animation Container -->
        <div class="relative w-64 h-64 mb-8 flex items-center justify-center">
            
            <!-- Certificate SVG -->
            <svg id="certIcon" class="absolute w-24 h-24 text-yellow-400 opacity-0" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3zM3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0z"></path>
            </svg>

            <!-- Bag SVG -->
            <svg id="bagIcon" class="w-40 h-40 text-white drop-shadow-2xl" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
            </svg>

            <!-- Success Tick -->
            <svg class="absolute w-20 h-20 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path class="check-draw" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- Text Content -->
        <div class="fade-up glass p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Enrollment Successful!</h1>
            <p id="enrollmentMessage" class="text-gray-600 leading-relaxed">
                Hey <span id="userName" class="text-blue-600 font-bold">Student</span>,<br> 
                you enrolled in <span id="courseName" class="font-bold text-gray-800">your course</span> <br>
                by <span id="instName" class="font-bold text-gray-800">the Institute</span>.
            </p>
            <button onclick="window.close()" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Go to Dashboard</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function startProcess() {
            const params = new URLSearchParams(window.location.search);
            const studentId = params.get('student');
            const couponCode = params.get('cc');
            const batchId = params.get('batches');

            if (!studentId || !couponCode || !batchId) {
                alert("Invalid Access Parameters");
                return;
            }

            try {
                // 1. Fetch Student Data
                const studentRef = doc(db, "Accounts", studentId);
                const studentSnap = await getDoc(studentRef);

                // 2. Fetch Coupon Data
                const couponRef = doc(db, "coupons", couponCode);
                const couponSnap = await getDoc(couponRef);

                if (!studentSnap.exists() || !couponSnap.exists()) {
                    throw new Error("Data not found in database");
                }

                const studentData = studentSnap.data();
                const couponData = couponSnap.data();

                // 3. Simple validation (Add more if needed)
                if(couponData.usedCount >= couponData.maxUsage) throw new Error("Coupon Limit Reached");

                // 4. Update Database
                await updateDoc(studentRef, { "Batches": arrayUnion(batchId) });
                await updateDoc(couponRef, { usedCount: increment(1) });

                // 5. Success UI Update
                document.getElementById('userName').innerText = studentData['Full Name'] || "Student";
                document.getElementById('courseName').innerText = batchId; // You can fetch batch name if available
                document.getElementById('instName').innerText = "Inspire Institute"; // Default or fetch from Institutes

                showAnimation();

            } catch (e) {
                alert(e.message);
                document.getElementById('loaderScreen').innerHTML = `<p class='text-red-500'>${e.message}</p>`;
            }
        }

        function showAnimation() {
            document.getElementById('loaderScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            
            // Trigger animations
            document.getElementById('certIcon').classList.add('cert-fly');
            document.getElementById('bagIcon').classList.add('bag-bounce');
        }

        // Start
        startProcess();
    </script>
</body>
</html>
