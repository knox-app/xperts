<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrolling Student...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Your Firebase Config -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen">

    <div id="statusBox" class="bg-white p-8 rounded-lg shadow-lg text-center max-w-sm">
        <div id="loader" class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <h2 id="statusTitle" class="text-xl font-bold mb-2">Processing Enrollment</h2>
        <p id="statusMsg" class="text-gray-500">Checking coupon and batch details...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            updateDoc, 
            arrayUnion, 
            increment 
        } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // Initialize
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processEnrollment() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('student'); // e.g. XPRT2607063WE22
            const couponCode = urlParams.get('cc');      // The generated code
            const batchId = urlParams.get('batches');    // e.g. XPRTBTCH22805

            const statusTitle = document.getElementById('statusTitle');
            const statusMsg = document.getElementById('statusMsg');
            const loader = document.getElementById('loader');

            // 1. Check if URL parameters exist
            if (!studentId || !couponCode || !batchId) {
                showUI("Error", "Missing required info in URL.", "red");
                return;
            }

            try {
                // 2. Verify the Coupon first
                const couponRef = doc(db, "coupons", couponCode);
                const couponSnap = await getDoc(couponRef);

                if (!couponSnap.exists()) {
                    showUI("Invalid Coupon", "This coupon code does not exist.", "red");
                    return;
                }

                const couponData = couponSnap.data();
                const today = new Date().toISOString().split('T')[0];

                // 3. Coupon Validations
                if (couponData.batchId !== batchId) {
                    showUI("Mismatch", "Coupon not valid for this batch.", "red");
                    return;
                }
                if (today > couponData.validity) {
                    showUI("Expired", "This coupon has expired.", "red");
                    return;
                }
                if (couponData.usedCount >= couponData.maxUsage) {
                    showUI("Limit Reached", "Coupon usage limit has been reached.", "red");
                    return;
                }

                // 4. Update the Student Account (Matches your Image Structure)
                // Path: Accounts > {studentId}
                const studentRef = doc(db, "Accounts", studentId);
                const studentSnap = await getDoc(studentRef);

                if (!studentSnap.exists()) {
                    showUI("Account Not Found", `Student ID ${studentId} not found.`, "red");
                    return;
                }

                // Use arrayUnion to add the batchId into the 'Batches' array field
                await updateDoc(studentRef, {
                    "Batches": arrayUnion(batchId)
                });

                // 5. Update Coupon usage count
                await updateDoc(couponRef, {
                    usedCount: increment(1)
                });

                showUI("Success!", `Successfully added to ${batchId}`, "green");

            } catch (error) {
                console.error(error);
                showUI("System Error", error.message, "red");
            }
        }

        function showUI(title, msg, color) {
            const statusTitle = document.getElementById('statusTitle');
            const statusMsg = document.getElementById('statusMsg');
            const loader = document.getElementById('loader');

            loader.classList.add('hidden');
            statusTitle.innerText = title;
            statusMsg.innerText = msg;
            
            if(color === "red") statusTitle.className = "text-xl font-bold mb-2 text-red-600";
            if(color === "green") statusTitle.className = "text-xl font-bold mb-2 text-green-600";
        }

        processEnrollment();
    </script>
</body>
</html>
