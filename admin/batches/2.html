<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #ffffff; }
        
        .container-box { perspective: 1000px; }

        /* Animation States */
        #bag-container { transition: all 0.8s ease; }
        
        /* 1. Zipper Animation */
        .zip-left, .zip-right { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: top; }
        .is-open .zip-left { transform: rotate(-25deg) translateX(-10px); }
        .is-open .zip-right { transform: rotate(25deg) translateX(10px); }

        /* 2. Certificate Slide */
        #cert-card {
            transform: translateY(0) scale(1);
            transition: all 0.8s cubic-bezier(0.5, 0, 0.5, 1);
            z-index: 10;
        }
        .is-inserted #cert-card {
            transform: translateY(160px) scale(0.5);
            opacity: 0;
        }

        /* 3. Success Check */
        #big-tick {
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .show-tick #big-tick { transform: scale(1.2); }

        /* Floating Animation */
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        .loader-ring {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #2563eb; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-6">

    <div class="max-w-md w-full text-center">
        
        <!-- THE ANIMATION STAGE -->
        <div id="stage" class="relative w-full h-80 flex items-center justify-center mb-12 container-box">
            
            <!-- Certificate SVG -->
            <div id="cert-card" class="absolute top-0">
                <svg width="140" height="100" viewBox="0 0 140 100">
                    <rect width="140" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="4"/>
                    <path d="M30 30h80M30 50h50M30 70h70" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="110" cy="70" r="12" fill="#fbbf24"/>
                </svg>
            </div>

            <!-- Backpack SVG -->
            <div id="bag-container" class="relative z-20 float-anim">
                <svg width="220" height="260" viewBox="0 0 200 240" fill="none">
                    <!-- Back Main -->
                    <path d="M30 80C30 40 60 10 100 10C140 10 170 40 170 80V210C170 226 156 240 140 240H60C44 240 30 226 30 210V80Z" fill="#2563eb"/>
                    
                    <!-- Inner Pocket Gap (Where cert goes) -->
                    <rect x="50" y="80" width="100" height="40" fill="#1e3a8a" rx="4"/>

                    <!-- Zipper Left -->
                    <path d="M100 80L60 180" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" class="zip-left"/>
                    <!-- Zipper Right -->
                    <path d="M100 80L140 180" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" class="zip-right"/>

                    <!-- Front Flap -->
                    <path d="M40 110C40 90 55 75 75 75H125C145 75 160 90 160 110V215C160 228 149 239 135 239H65C51 239 40 228 40 215V110Z" fill="#3b82f6"/>
                    
                    <!-- Bottom Pocket -->
                    <rect x="60" y="160" width="80" height="50" rx="12" fill="#06b6d4"/>
                    <rect x="90" y="170" width="20" height="6" rx="3" fill="white" fill-opacity="0.5"/>
                </svg>

                <!-- Checkmark Overlay -->
                <div id="big-tick" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-green-500 rounded-full p-4 shadow-2xl border-4 border-white">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4">
                        <path d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- TEXT DATA -->
        <div id="loading-area">
            <div class="loader-ring mx-auto mb-4"></div>
            <p class="text-gray-400 font-bold uppercase tracking-widest text-xs">Securing Enrollment</p>
        </div>

        <div id="content-area" class="hidden opacity-0 transform translate-y-10 transition-all duration-1000">
            <h2 class="text-gray-500 font-semibold text-lg mb-1">Welcome aboard,</h2>
            <h1 id="student-name" class="text-4xl font-extrabold text-gray-900 mb-6 italic tracking-tight">...</h1>
            
            <div class="bg-blue-50 rounded-3xl p-6 border border-blue-100 mb-6">
                <p class="text-blue-500 font-bold text-sm uppercase mb-1">Enrolled In</p>
                <h3 id="batch-name" class="text-xl font-extrabold text-blue-900">...</h3>
            </div>

            <p class="text-gray-400 font-medium italic">
                Verified by <span id="inst-name" class="text-gray-600 font-bold">...</span>
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function runBeastEnrollment() {
            const urlParams = new URLSearchParams(window.location.search);
            const sid = urlParams.get('student');
            const cc = urlParams.get('cc');
            const bid = urlParams.get('batches');

            if (!sid || !cc || !bid) return;

            try {
                // 1. Fetch Data
                const [studSnap, batchSnap, instSnap] = await Promise.all([
                    getDoc(doc(db, "Accounts", sid)),
                    getDoc(doc(doc(db, "Batches", bid))),
                    getDoc(doc(db, "Institutes", "INSPIREJWR3247")) // Default based on your image
                ]);

                if (!studSnap.exists()) return alert("Account error");

                const studentData = studSnap.data();
                const batchData = batchSnap.exists() ? batchSnap.data() : { name: bid };
                const instData = instSnap.exists() ? instSnap.data() : { "Full Name": "Xpert Institute" };

                // 2. Database Action
                await updateDoc(doc(db, "Accounts", sid), { "Batches": arrayUnion(bid) });
                await updateDoc(doc(db, "coupons", cc), { usedCount: increment(1) });

                // 3. UI Updates
                document.getElementById('student-name').innerText = studentData["Full Name"];
                document.getElementById('batch-name').innerText = batchData["name"] || bid;
                document.getElementById('inst-name').innerText = instData["Full Name"];

                triggerAnimation();

            } catch (e) {
                console.error(e);
            }
        }

        function triggerAnimation() {
            const stage = document.getElementById('stage');
            
            // Step 1: Open Zipper
            setTimeout(() => {
                stage.classList.add('is-open');
                
                // Step 2: Slide Certificate
                setTimeout(() => {
                    stage.classList.add('is-inserted');
                    
                    // Step 3: Close Zipper
                    setTimeout(() => {
                        stage.classList.remove('is-open');
                        
                        // Step 4: Show Tick and Data
                        setTimeout(() => {
                            stage.classList.add('show-tick');
                            document.getElementById('loading-area').classList.add('hidden');
                            const content = document.getElementById('content-area');
                            content.classList.remove('hidden');
                            setTimeout(() => {
                                content.classList.add('opacity-100');
                                content.classList.remove('translate-y-10');
                            }, 50);
                        }, 600);
                    }, 1000);
                }, 800);
            }, 500);
        }

        window.onload = runBeastEnrollment;
    </script>
</body>
</html>
