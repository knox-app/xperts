<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; overflow: hidden; }
        .zip-l, .zip-r { transition: transform 0.5s ease; transform-origin: top; }
        .open .zip-l { transform: rotate(-30deg) translateX(-15px); }
        .open .zip-r { transform: rotate(30deg) translateX(15px); }
        #cert { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide #cert { transform: translateY(180px) scale(0.4); opacity: 0; }
        #success-tick { transform: scale(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pop #success-tick { transform: scale(1); }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="w-full max-w-sm">
        <!-- BEAST ANIMATION -->
        <div id="box" class="relative h-64 mb-12 flex items-center justify-center">
            <!-- Cert -->
            <div id="cert" class="absolute top-0 z-10">
                <svg width="120" height="90" viewBox="0 0 120 90" fill="none">
                    <rect width="120" height="90" rx="8" fill="white" stroke="#E2E8F0" stroke-width="3"/>
                    <rect x="20" y="25" width="80" height="6" rx="3" fill="#CBD5E1"/>
                    <rect x="20" y="45" width="50" height="6" rx="3" fill="#CBD5E1"/>
                    <circle cx="100" cy="70" r="10" fill="#FBBF24"/>
                </svg>
            </div>
            <!-- Bag -->
            <div class="relative z-20 floating">
                <svg width="180" height="200" viewBox="0 0 180 200">
                    <path d="M30 60C30 30 50 10 90 10C130 10 150 30 150 60V180C150 191 141 200 130 200H50C39 200 30 191 30 180V60Z" fill="#2563EB"/>
                    <path d="M90 60L60 140" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" class="zip-l"/>
                    <path d="M90 60L120 140" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" class="zip-r"/>
                    <path d="M40 80C40 70 50 60 60 60H120C130 60 140 70 140 80V185C140 193 133 200 125 200H55C47 200 40 193 40 185V80Z" fill="#3B82F6"/>
                    <rect x="60" y="130" width="60" height="40" rx="8" fill="#06B6D4"/>
                </svg>
                <!-- Tick -->
                <div id="success-tick" class="absolute inset-0 flex items-center justify-center">
                    <div class="bg-green-500 p-4 rounded-full shadow-2xl border-4 border-white">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- INFO -->
        <div id="loading-txt" class="text-gray-400 font-bold animate-pulse">Verifying Enrollment...</div>
        
        <div id="data-txt" class="hidden opacity-0 transition-all duration-1000 translate-y-4">
            <h2 class="text-gray-500 font-bold uppercase tracking-widest text-xs mb-2">Successfully Enrolled</h2>
            <h1 id="sName" class="text-3xl font-extrabold text-gray-900 mb-4 italic">Student Name</h1>
            <div class="inline-block bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm mb-6 shadow-lg shadow-blue-200" id="bName">Batch Name</div>
            <p class="text-gray-400 text-sm italic">Organized by <span id="iName" class="font-bold text-gray-700">...</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function process() {
            const p = new URLSearchParams(window.location.search);
            const sid = p.get('student'), cc = p.get('cc'), bid = p.get('batches');
            if(!sid || !cc || !bid) return;

            try {
                const [cSnap, sSnap, bSnap] = await Promise.all([
                    getDoc(doc(db, "coupons", cc)),
                    getDoc(doc(db, "Accounts", sid)),
                    getDoc(doc(db, "Batches", bid))
                ]);

                if(!cSnap.exists() || !sSnap.exists()) return alert("Invalid Data");
                
                const cData = cSnap.data();
                if(cData.usedCount >= cData.maxUsage) return alert("Coupon limit reached");

                // Update Database
                await updateDoc(doc(db, "Accounts", sid), { "Batches": arrayUnion(bid) });
                await updateDoc(doc(db, "coupons", cc), { usedCount: increment(1) });

                // UI Fill
                document.getElementById('sName').innerText = sSnap.data()["Full Name"];
                document.getElementById('bName').innerText = bSnap.exists() ? (bSnap.data().name || bid) : bid;
                document.getElementById('iName').innerText = cData.instName || "Institute";

                // Play Beast Animation
                const box = document.getElementById('box');
                setTimeout(() => {
                    box.classList.add('open');
                    setTimeout(() => {
                        box.classList.add('slide');
                        setTimeout(() => {
                            box.classList.remove('open');
                            setTimeout(() => {
                                box.classList.add('pop');
                                document.getElementById('loading-txt').classList.add('hidden');
                                const dt = document.getElementById('data-txt');
                                dt.classList.remove('hidden');
                                setTimeout(() => { dt.classList.replace('opacity-0', 'opacity-100'); dt.classList.remove('translate-y-4'); }, 100);
                            }, 500);
                        }, 800);
                    }, 600);
                }, 500);

            } catch (e) { console.error(e); }
        }
        process();
    </script>
</body>
</html>
