<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Create Live Class</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Google Identity Services for YouTube OAuth -->
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
    <!-- Load your specific Firebase Config -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #4285f4;
            --border: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #aaa; }
        input, select, button { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: #252525; color: white; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #3367d6; }
        button:disabled { background: #555; cursor: not-allowed; }
        #login-screen { display: block; }
        #main-admin { display: none; }
        .hidden { display: none; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        .status { font-size: 0.8rem; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="container">
        <h2>Admin Login</h2>
        <div class="form-group">
            <label>Institution ID</label>
            <input type="text" id="inst-id-input" placeholder="e.g. INSPIREJWR3247">
        </div>
        <button onclick="login()">Login</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-admin" class="container">
        <h2>Schedule Live Class</h2>
        
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="class-title" placeholder="Class Title">
        </div>

        <div class="form-group">
            <label>Select Batch</label>
            <select id="batch-select" onchange="loadSubjects()">
                <option value="">Choose Batch...</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Subject</label>
                <select id="subject-select" onchange="loadChaptersAndTeachers()">
                    <option value="">Select Subject</option>
                </select>
            </div>
            <div class="form-group">
                <label>Chapter</label>
                <select id="chapter-select">
                    <option value="">Select Chapter</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Assigned Teacher</label>
            <input type="text" id="teacher-display" readonly placeholder="Teacher will appear here">
            <input type="hidden" id="teacher-id">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="class-date">
            </div>
            <div class="form-group">
                <label>From</label>
                <input type="time" id="time-from">
            </div>
            <div class="form-group">
                <label>To</label>
                <input type="time" id="time-to">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Doubts/Comments</label>
                <select id="comments-toggle">
                    <option value="on">ON</option>
                    <option value="off">OFF</option>
                </select>
            </div>
            <div class="form-group">
                <label>Audience</label>
                <select id="audience-select">
                    <option value="All">All (Public)</option>
                    <option value="Batches">Batches (Unlisted)</option>
                </select>
            </div>
        </div>

        <button id="create-btn" onclick="handleCreateLive()">Create Live Class & Sync YouTube</button>
        <div id="status-msg" class="status"></div>
    </div>

<script>
    // Configuration
    const CLIENT_ID = '878851646059-df1b22bspju27a2gjb4o9n4mrtpo7kkr.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/youtube.force-ssl';
    
    let db;
    let currentInstId = "";
    let tokenClient;
    let accessToken = null;
    let batchDataMap = {}; // To store full batch objects locally

    // Initialize Firebase and Session
    window.onload = () => {
        // Wait for xprtfb.js to load firebaseConfig
        if (typeof firebaseConfig !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            checkUrlSession();
        } else {
            setTimeout(window.onload, 500);
        }
    };

    function checkUrlSession() {
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('session');
        if (session) {
            currentInstId = session;
            proceedToDashboard();
        }
    }

    function login() {
        currentInstId = document.getElementById('inst-id-input').value;
        if (currentInstId) proceedToDashboard();
    }

    async function proceedToDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-admin').style.display = 'block';
        loadBatches();
    }

    // Google API Client Init
    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                accessToken = tokenResponse.access_token;
                createYouTubeBroadcast();
            },
        });
    }

    // LOAD DATA FROM FIRESTORE
    async function loadBatches() {
        const snapshot = await db.collection('Batches')
            .where('Institution', '==', currentInstId).get();
        
        const select = document.getElementById('batch-select');
        snapshot.forEach(doc => {
            const data = doc.data();
            batchDataMap[doc.id] = data;
            let opt = document.createElement('option');
            opt.value = doc.id;
            opt.innerHTML = data["Batch Name"] || doc.id;
            select.appendChild(opt);
        });
    }

    function loadSubjects() {
        const batchId = document.getElementById('batch-select').value;
        const subSelect = document.getElementById('subject-select');
        subSelect.innerHTML = '<option value="">Select Subject</option>';
        
        if (batchId && batchDataMap[batchId]) {
            const subjects = batchDataMap[batchId].Subjects || [];
            subjects.forEach(sub => {
                let opt = document.createElement('option');
                opt.value = sub;
                opt.innerHTML = sub;
                subSelect.appendChild(opt);
            });
        }
    }

    async function loadChaptersAndTeachers() {
        const batchId = document.getElementById('batch-select').value;
        const subject = document.getElementById('subject-select').value;
        const chapSelect = document.getElementById('chapter-select');
        
        if (!batchId || !subject) return;

        // 1. Load Chapters from 'content' collection
        chapSelect.innerHTML = '<option value="loading">Loading chapters...</option>';
        const contentSnap = await db.collection('content')
            .where('Id', '==', batchId)
            .where('Subject', '==', subject)
            .get();
        
        chapSelect.innerHTML = '<option value="">Select Chapter</option>';
        contentSnap.forEach(doc => {
            let opt = document.createElement('option');
            opt.value = doc.id;
            opt.innerHTML = doc.data().Name;
            chapSelect.appendChild(opt);
        });

        // 2. Identify Teacher from Batch mapping
        const batch = batchDataMap[batchId];
        const teacherMap = batch.Teachers || [];
        // Map structure: Teachers is an array of maps e.g. [{Physics: "ID"}]
        let teacherId = "";
        teacherMap.forEach(m => {
            if (m[subject]) teacherId = m[subject];
        });

        if (teacherId) {
            const teacherSnap = await db.collection('Accounts').doc(teacherId).get();
            if (teacherSnap.exists) {
                document.getElementById('teacher-display').value = teacherSnap.data()["Full Name"];
                document.getElementById('teacher-id').value = teacherId;
            }
        }
    }

    // YOUTUBE INTEGRATION LOGIC
    function handleCreateLive() {
        const btn = document.getElementById('create-btn');
        btn.disabled = true;
        document.getElementById('status-msg').innerText = "Authenticating with Google...";
        
        // Start OAuth flow
        tokenClient.requestAccessToken({prompt: ''});
    }

    async function createYouTubeBroadcast() {
        const title = document.getElementById('class-title').value;
        const date = document.getElementById('class-date').value;
        const timeFrom = document.getElementById('time-from').value;
        const audience = document.getElementById('audience-select').value;
        
        if (!title || !date || !timeFrom) {
            alert("Please fill Title, Date and Start Time");
            return;
        }

        const scheduledStartTime = new Date(`${date}T${timeFrom}:00`).toISOString();
        const privacyStatus = (audience === 'All') ? 'public' : 'unlisted';

        document.getElementById('status-msg').innerText = "Creating YouTube Broadcast...";

        try {
            const response = await fetch('https://www.googleapis.com/youtube/v3/liveBroadcasts?part=snippet,status,contentDetails', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    snippet: {
                        title: title,
                        scheduledStartTime: scheduledStartTime,
                        description: `Live class session for ${document.getElementById('subject-select').value}`
                    },
                    status: {
                        privacyStatus: privacyStatus,
                        selfDeclaredMadeForKids: false
                    }
                })
            });

            const data = await response.json();
            
            if (data.id) {
                saveToFirestore(data.id);
            } else {
                throw new Error(data.error.message);
            }
        } catch (err) {
            document.getElementById('status-msg').innerText = "Error: " + err.message;
            document.getElementById('create-btn').disabled = false;
        }
    }

    async function saveToFirestore(ytId) {
        document.getElementById('status-msg').innerText = "Saving to Database...";
        
        const payload = {
            Tittle: document.getElementById('class-title').value,
            Teacher: document.getElementById('teacher-id').value,
            video: `youtube.com/watch?v=${ytId}`,
            date: document.getElementById('class-date').value,
            time_from: document.getElementById('time-from').value,
            time_to: document.getElementById('time-to').value,
            comments: document.getElementById('comments-toggle').value,
            audience: document.getElementById('audience-select').value,
            batch_id: document.getElementById('batch-select').value,
            subject: document.getElementById('subject-select').value,
            chapter_id: document.getElementById('chapter-select').value,
            institute_id: currentInstId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection('Lectures').add(payload);
            document.getElementById('status-msg').style.color = "#4caf50";
            document.getElementById('status-msg').innerText = "Success! Class created and synced.";
            setTimeout(() => location.reload(), 3000);
        } catch (e) {
            document.getElementById('status-msg').innerText = "Firestore Error: " + e.message;
        }
    }
</script>
</body>
</html>
