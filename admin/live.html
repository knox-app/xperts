<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpert Admin - Live Class Creator</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; --accent: #3ea6ff; --border: #333; --error: #ff4444; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        h2 { margin-top: 0; font-weight: 400; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.4rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #aaa; }
        input, select, button { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #222; color: white; box-sizing: border-box; font-size: 0.95rem; }
        button { background: var(--accent); color: black; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #444; cursor: not-allowed; color: #777; }
        .secondary-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); font-size: 0.75rem; padding: 5px; margin-top: 5px; cursor: pointer; border-radius: 4px;}
        #main-admin, #replacement-section { display: none; }
        .yt-status { padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; }
        .yt-synced { background: rgba(62, 166, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); }
        .yt-pending { background: rgba(255, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Administrator Access</h2>
        <div class="form-group">
            <label>Institution ID</label>
            <input type="text" id="inst-id-input" placeholder="Enter ID (e.g. INSPIREJWR3247)">
        </div>
        <button onclick="verifyAndLogin()">Verify & Login</button>
        <p id="login-error" style="color:var(--error); font-size:0.8rem; display:none; margin-top:10px;">Invalid Institution ID.</p>
    </div>

    <div id="main-admin" class="container">
        <div id="yt-indicator" class="yt-status yt-pending">YouTube Sync Required</div>
        <button id="sync-btn" onclick="syncYouTube()">Authorize YouTube</button>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="form-group">
            <label>Select Batch</label>
            <select id="batch-select" onchange="loadSubjects()">
                <option value="">Choose a Batch...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <select id="subject-select" onchange="handleSubjectChange()" disabled>
                <option value="">Select Subject</option>
            </select>
        </div>

        <div class="form-group">
            <label>Chapter</label>
            <select id="chapter-select" disabled>
                <option value="">Select Chapter</option>
            </select>
        </div>

        <div class="form-group">
            <label>Assigned Teacher</label>
            <input type="text" id="teacher-name-display" readonly placeholder="Auto-assigned">
            <input type="hidden" id="teacher-id-val">
            <button class="secondary-btn" id="replace-btn" onclick="showTeacherReplacement()" disabled>Emergency: Replace Teacher</button>
        </div>

        <div id="replacement-section" class="form-group" style="border: 1px dashed #444; padding: 10px; border-radius: 5px;">
            <label>Select Replacement (From Institute)</label>
            <select id="replacement-select" onchange="applyReplacement()">
                <option value="">Choose Teacher...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Class Title</label>
            <input type="text" id="class-title" placeholder="Lecture Title">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="class-date">
            </div>
            <div class="form-group">
                <label>Audience</label>
                <select id="audience-select">
                    <option value="All">All (Public)</option>
                    <option value="Batches">Batches (Unlisted)</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>From Time</label>
                <input type="time" id="time-from">
            </div>
            <div class="form-group">
                <label>To Time</label>
                <input type="time" id="time-to">
            </div>
        </div>

        <button id="create-btn" onclick="createBroadcast()" disabled>Create Live Class</button>
        <p id="status-msg" style="text-align:center; font-size: 0.85rem; margin-top:10px;"></p>
    </div>

<script>
    const CLIENT_ID = '878851646059-df1b22bspju27a2gjb4o9n4mrtpo7kkr.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/youtube.force-ssl';
    
    let db, currentInstId, tokenClient, accessToken = null;
    let cachedBatches = {};

    window.onload = () => {
        if (typeof firebaseConfig !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            const session = new URLSearchParams(window.location.search).get('session');
            if (session) { document.getElementById('inst-id-input').value = session; verifyAndLogin(); }
        } else { setTimeout(window.onload, 500); }
    };

    async function verifyAndLogin() {
        const id = document.getElementById('inst-id-input').value.trim();
        if(!id) return;
        const instDoc = await db.collection('Institutes').doc(id).get();
        if (instDoc.exists) {
            currentInstId = id;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-admin').style.display = 'block';
            loadBatches();
        } else { document.getElementById('login-error').style.display = 'block'; }
    }

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (resp) => {
                accessToken = resp.access_token;
                document.getElementById('yt-indicator').innerText = "YouTube Synced ✅";
                document.getElementById('yt-indicator').className = "yt-status yt-synced";
                document.getElementById('sync-btn').style.display = "none";
                document.getElementById('create-btn').disabled = false;
            },
        });
    }

    function syncYouTube() { tokenClient.requestAccessToken({prompt: ''}); }

    async function loadBatches() {
        const snap = await db.collection('Batches').where('Institution', '==', currentInstId).get();
        const select = document.getElementById('batch-select');
        snap.forEach(doc => {
            cachedBatches[doc.id] = doc.data();
            let opt = document.createElement('option');
            opt.value = doc.id;
            opt.innerText = doc.data()["Batch Name"];
            select.appendChild(opt);
        });
    }

    // FIXED: Splitting the "Subjects" string correctly
    function loadSubjects() {
        const bId = document.getElementById('batch-select').value;
        const subSel = document.getElementById('subject-select');
        subSel.innerHTML = '<option value="">Select Subject</option>';
        subSel.disabled = !bId;
        
        if (bId && cachedBatches[bId]) {
            const subjectString = cachedBatches[bId].Subjects || "";
            // Split by semicolon and trim whitespace
            const subjectList = subjectString.split(';').map(s => s.trim());
            
            subjectList.forEach(s => {
                if (s) {
                    let opt = document.createElement('option');
                    opt.value = s; opt.innerText = s;
                    subSel.appendChild(opt);
                }
            });
        }
    }

    async function handleSubjectChange() {
        const bId = document.getElementById('batch-select').value;
        const sub = document.getElementById('subject-select').value;
        if (!bId || !sub) return;

        const chapSel = document.getElementById('chapter-select');
        chapSel.disabled = false;
        chapSel.innerHTML = '<option>Loading chapters...</option>';
        
        const contentSnap = await db.collection('content')
            .where('Id', '==', bId)
            .where('Subject', '==', sub).get();
            
        chapSel.innerHTML = '<option value="">Select Chapter</option>';
        contentSnap.forEach(d => {
            let opt = document.createElement('option');
            opt.value = d.id; opt.innerText = d.data().Name;
            chapSel.appendChild(opt);
        });

        const teachersArr = cachedBatches[bId].Teachers || [];
        let tId = "";
        teachersArr.forEach(m => { if(m[sub]) tId = m[sub]; });

        if(tId) {
            const tDoc = await db.collection('Accounts').doc(tId).get();
            document.getElementById('teacher-name-display').value = tDoc.exists ? tDoc.data()["Full Name"] : "ID: " + tId;
            document.getElementById('teacher-id-val').value = tId;
            document.getElementById('replace-btn').disabled = false;
        }
    }

    async function showTeacherReplacement() {
        document.getElementById('replacement-section').style.display = 'block';
        const relSel = document.getElementById('replacement-select');
        relSel.innerHTML = '<option>Searching staff...</option>';

        const snap = await db.collection('Accounts')
            .where('Type', '==', 'Teacher')
            .where('Institute', 'array-contains', currentInstId)
            .get();

        relSel.innerHTML = '<option value="">Choose Teacher...</option>';
        snap.forEach(doc => {
            let opt = document.createElement('option');
            opt.value = doc.id; opt.innerText = doc.data()["Full Name"];
            relSel.appendChild(opt);
        });
    }

    function applyReplacement() {
        const sel = document.getElementById('replacement-select');
        if(sel.value) {
            document.getElementById('teacher-name-display').value = sel.options[sel.selectedIndex].text + " (Replaced)";
            document.getElementById('teacher-id-val').value = sel.value;
        }
    }

    function generateDocID() {
        const rand = Math.floor(10000000 + Math.random() * 90000000).toString();
        return `XPRTLCR${rand}`;
    }

    async function createBroadcast() {
        const title = document.getElementById('class-title').value;
        const date = document.getElementById('class-date').value;
        const start = document.getElementById('time-from').value;
        if(!title || !date || !start) return alert("Please fill Title, Date and Start Time");

        document.getElementById('status-msg').innerText = "Syncing with YouTube Live...";
        const scheduledTime = new Date(`${date}T${start}:00`).toISOString();
        const privacy = document.getElementById('audience-select').value === 'All' ? 'public' : 'unlisted';

        try {
            const resp = await fetch('https://www.googleapis.com/youtube/v3/liveBroadcasts?part=snippet,status', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    snippet: { title: title, scheduledStartTime: scheduledTime },
                    status: { privacyStatus: privacy, selfDeclaredMadeForKids: false }
                })
            });
            const data = await resp.json();
            if(data.id) saveLecture(data.id);
            else throw new Error(data.error.message);
        } catch(e) { document.getElementById('status-msg').innerText = "YT Error: " + e.message; }
    }

    async function saveLecture(ytId) {
        document.getElementById('status-msg').innerText = "Saving Class Document...";
        const customID = generateDocID();
        
        const lectureData = {
            Tittle: document.getElementById('class-title').value,
            Teacher: document.getElementById('teacher-id-val').value,
            Subject: document.getElementById('subject-select').value,
            video: `youtube.com/watch?v=${ytId}`,
            batch_id: document.getElementById('batch-select').value,
            chapter_id: document.getElementById('chapter-select').value,
            date: document.getElementById('class-date').value,
            time_from: document.getElementById('time-from').value,
            time_to: document.getElementById('time-to').value,
            audience: document.getElementById('audience-select').value,
            institute: currentInstId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('Lectures').doc(customID).set(lectureData);
        document.getElementById('status-msg').innerHTML = `<b style="color:var(--accent)">Success! Created: ${customID}</b>`;
        setTimeout(() => location.reload(), 3000);
    }
</script>
</body>
</html>
