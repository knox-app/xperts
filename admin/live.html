<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <!-- Google API for YouTube -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <!-- External Firebase Keys -->
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { background-color: #121212; color: #e0e0e0; }
        input, select, textarea { background-color: #1e1e1e !important; border: 1px solid #333 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Login Section -->
    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-zinc-900 p-8 rounded-lg shadow-xl hidden">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Institution Login</h2>
        <input type="text" id="instIdInput" placeholder="Enter Institution ID" class="w-full p-3 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">Login</button>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard" class="max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Create Live Class</h1>
                <p id="instDisplay" class="text-zinc-400">Institution: --</p>
            </div>
            <button id="ytAuthBtn" onclick="handleAuthClick()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold flex items-center">
                <span id="ytStatus">Connect YouTube</span>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-zinc-900 p-6 rounded-xl border border-zinc-800">
            <!-- Left Side -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Title</label>
                    <input type="text" id="classTitle" placeholder="e.g. Haridity L-01" class="w-full p-2 rounded">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Select Chapter (from Content)</label>
                    <select id="chapterSelect" onchange="updateSubject()" class="w-full p-2 rounded">
                        <option value="">Loading chapters...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Subject</label>
                    <input type="text" id="classSubject" readonly class="w-full p-2 rounded bg-zinc-800 opacity-70" placeholder="Auto-filled from chapter">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Date</label>
                        <input type="date" id="classDate" class="w-full p-2 rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Start Time</label>
                        <input type="time" id="startTime" class="w-full p-2 rounded">
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">End Time</label>
                    <input type="time" id="endTime" class="w-full p-2 rounded">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Audience</label>
                    <select id="classAudience" class="w-full p-2 rounded">
                        <option value="All">All (Public on YouTube)</option>
                        <option value="Batches">Batches (Unlisted on YouTube)</option>
                    </select>
                </div>

                <div class="flex items-center justify-between p-3 bg-zinc-800 rounded mt-6">
                    <span class="text-sm">Comments & Doubts</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="commentsToggle" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>

                <button id="createBtn" onclick="createLiveClass()" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg shadow-lg transform active:scale-95 transition">
                    CREATE LIVE CLASS & START STREAM
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = '878851646059-df1b22bspju27a2gjb4o9n4mrtpo7kkr.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/youtube.force-ssl';
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let db;
        let currentInstId = "";

        // --- INITIALIZATION ---
        window.onload = () => {
            initFirebase();
            gapi.load('client', intializeGapiClient);
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // defined later
            });
            checkSession();
        };

        function initFirebase() {
            // firebaseConfig is provided by the script loaded in the head
            if(typeof firebaseConfig !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            } else {
                console.error("Firebase config not found. Check xprtfb.js link.");
            }
        }

        async function intializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"],
            });
            gapiInited = true;
        }

        // --- AUTH & SESSION ---
        function checkSession() {
            const urlParams = new URLSearchParams(window.location.search);
            const session = urlParams.get('session');
            if (session) {
                loginSuccess(session);
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
            }
        }

        function handleLogin() {
            const id = document.getElementById('instIdInput').value.trim();
            if(id) loginSuccess(id);
        }

        function loginSuccess(instId) {
            currentInstId = instId;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('instDisplay').innerText = `Institution: ${instId}`;
            fetchChapters();
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('ytStatus').innerText = "YouTube Connected ✅";
                document.getElementById('ytAuthBtn').classList.replace('bg-red-600', 'bg-green-800');
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // --- DATA FETCHING ---
        async function fetchChapters() {
            const select = document.getElementById('chapterSelect');
            try {
                const snapshot = await db.collection('content').get();
                select.innerHTML = '<option value="">-- Choose Chapter --</option>';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    let option = document.createElement('option');
                    option.value = doc.id;
                    option.text = data.Name || "Untitled";
                    option.dataset.subject = data.Subject || "General";
                    select.appendChild(option);
                });
            } catch (err) {
                console.error("Error fetching chapters:", err);
                select.innerHTML = '<option value="">Error loading data</option>';
            }
        }

        function updateSubject() {
            const select = document.getElementById('chapterSelect');
            const selectedOption = select.options[select.selectedIndex];
            document.getElementById('classSubject').value = selectedOption.dataset.subject || "";
        }

        // --- CORE LOGIC ---
        async function createLiveClass() {
            const title = document.getElementById('classTitle').value;
            const date = document.getElementById('classDate').value;
            const startTime = document.getElementById('startTime').value;
            const audience = document.getElementById('classAudience').value;
            const btn = document.getElementById('createBtn');

            if(!title || !date || !startTime) {
                alert("Please fill Title, Date and Start Time");
                return;
            }

            if (gapi.client.getToken() === null) {
                alert("Please connect YouTube first!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                // 1. Create YouTube Broadcast
                const scheduledStartTime = new Date(`${date}T${startTime}:00`).toISOString();
                const privacy = (audience === "All") ? "public" : "unlisted";

                const broadcastResponse = await gapi.client.youtube.liveBroadcasts.insert({
                    "part": ["snippet", "status", "contentDetails"],
                    "resource": {
                        "snippet": {
                            "title": title,
                            "scheduledStartTime": scheduledStartTime,
                        },
                        "status": {
                            "privacyStatus": privacy,
                            "selfDeclaredMadeForKids": false
                        },
                        "contentDetails": {
                            "enableComments": document.getElementById('commentsToggle').checked,
                            "enableAutoStart": true
                        }
                    }
                });

                const broadcastId = broadcastResponse.result.id;

                // 2. Create Stream (This provides the key for OBS)
                const streamResponse = await gapi.client.youtube.liveStreams.insert({
                    "part": ["snippet", "cdn"],
                    "resource": {
                        "snippet": { "title": title + " Stream" },
                        "cdn": {
                            "frameRate": "variable",
                            "ingestionType": "rtmp",
                            "resolution": "variable"
                        }
                    }
                });

                const streamId = streamResponse.result.id;
                const streamKey = streamResponse.result.cdn.ingestionInfo.streamName;

                // 3. Bind them together
                await gapi.client.youtube.liveBroadcasts.bind({
                    "id": broadcastId,
                    "part": ["id", "contentDetails"],
                    "streamId": streamId
                });

                // 4. Save to Firebase Lectures
                await db.collection('Lectures').add({
                    Tittle: title,
                    Subject: document.getElementById('classSubject').value,
                    Date: date,
                    Time: `${startTime} to ${document.getElementById('endTime').value}`,
                    Institution: currentInstId,
                    YouTubeID: broadcastId,
                    StreamKey: streamKey, // Admin needs this for OBS
                    Audience: audience,
                    video: `https://youtube.com/watch?v=${broadcastId}`
                });

                alert(`Class Created Successfully!\nYouTube Link: https://youtu.be/${broadcastId}\nStream Key for OBS: ${streamKey}`);
                btn.innerText = "CREATE ANOTHER CLASS";
                btn.disabled = false;

            } catch (err) {
                console.error(err);
                alert("Error creating stream: " + (err.result?.error?.message || "Unknown error"));
                btn.disabled = false;
                btn.innerText = "RETRY CREATE";
            }
        }
    </script>
</body>
</html>
