<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Details</title>
    <style>
        :root { --theme-color: #0066FF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; background-color: #fff; color: #1a1a1a; 
            padding-bottom: 80px;
        }

        /* --- Header Section --- */
        .header {
            padding: 20px;
            background: linear-gradient(180deg, #F0F7FF 0%, #FFFFFF 100%);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { cursor: pointer; font-size: 24px; }
        .ask-doubt {
            background: #fff; padding: 8px 16px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .chapter-title { font-size: 24px; font-weight: 800; margin: 0; color: #111; }
        .chapter-meta { font-size: 14px; color: #666; margin-top: 4px; }

        /* --- Video List --- */
        .container { padding: 20px; }
        .section-title { 
            font-size: 19px; font-weight: 700; margin: 25px 0 15px 0; 
            position: relative; display: inline-block;
        }
        .section-title::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 35px; height: 3px; background: #FFD700; border-radius: 2px;
        }

        .video-item {
            display: flex; gap: 15px; margin-bottom: 20px; align-items: center;
        }
        .thumb-box {
            position: relative; width: 120px; height: 75px; flex-shrink: 0;
        }
        .thumb-box img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }
        .duration {
            position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.7);
            color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 4px;
        }
        .video-info { flex-grow: 1; font-size: 15px; font-weight: 600; line-height: 1.3; }
        .dl-icon { color: #555; padding: 5px; }

        /* --- Toggle Button --- */
        .view-toggle {
            background: #EBF2FF; color: #0066FF; padding: 10px 20px;
            border-radius: 25px; width: fit-content; margin: 10px auto;
            font-weight: 600; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }

        /* --- Study Modules --- */
        .module-card {
            border: 1px solid #eee; border-radius: 20px; padding: 16px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
        }
        .icon-circle {
            width: 44px; height: 44px; background: #f8f9fa; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .module-text { flex-grow: 1; font-weight: 600; font-size: 15px; }

        /* --- Bottom Switcher --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border-radius: 40px; display: flex; padding: 5px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 100;
        }
        .nav-pill {
            padding: 12px 35px; border-radius: 35px; font-weight: 600; cursor: pointer;
        }
        .nav-pill.active { background: #1a1a1a; color: #fff; }
        .nav-pill.inactive { color: #999; }

        #loader { text-align: center; padding: 50px; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loader">Loading content...</div>

    <div id="main-content" class="hidden">
        <div class="header">
            <div class="top-bar">
                <div class="back-btn" onclick="window.history.back()">←</div>
                <div class="ask-doubt"><span>😊</span> Ask a doubt</div>
            </div>
            <h1 class="chapter-title" id="displayChapterName">Chapter Title</h1>
            <div class="chapter-meta" id="displayMeta">Class 0 • Subject</div>
        </div>

        <div class="container">
            <div class="section-title">Concept Videos</div>
            <div id="videoList"></div>
            
            <div id="viewToggleBtn" class="view-toggle hidden" onclick="toggleVideoView()">
                <span id="toggleText">View all</span> ▾
            </div>

            <div class="section-title">Study Modules</div>
            <div id="modulesList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-pill active">Learn</div>
        <div class="nav-pill inactive">Practice</div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <script>
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        // Replace underscores with spaces for cleaner matching
        const chapterNameParam = (urlParams.get('chapter') || "").replace(/_/g, ' ');
        const batchId = localStorage.getItem("activeBatchId");

        let allVideos = [];
        let isShowingAll = false;

        window.onload = async () => {
            if (!chapterNameParam || !batchId) {
                document.getElementById('loader').innerText = "Missing Chapter or Batch information.";
                return;
            }

            try {
                // 1. Find the specific chapter content for this batch
                const snap = await db.collection("content")
                    .where("Id", "==", batchId)
                    .where("Name", "==", chapterNameParam)
                    .limit(1)
                    .get();

                if (snap.empty) {
                    document.getElementById('loader').innerText = "Content not found.";
                    return;
                }

                const data = snap.docs[0].data();
                document.getElementById('displayChapterName').innerText = data.Name;
                
                // 2. Get Class Info from Batches collection
                const batchDoc = await db.collection("Batches").doc(batchId).get();
                const className = batchDoc.exists ? batchDoc.data().Class : "N/A";
                document.getElementById('displayMeta').innerText = `Class ${className} • ${data.Subject}`;

                // 3. Load Modules
                renderModules(data['Study Modules']);

                // 4. Load Videos
                if (data.Videos && data.Videos.length > 0) {
                    await fetchVideoDetails(data.Videos, data.Thumbnail);
                }

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerText = "Error loading content.";
            }
        };

        async function fetchVideoDetails(videoIds, fallbackThumb) {
            for (const id of videoIds) {
                const vDoc = await db.collection("Lectures").doc(id).get();
                if (vDoc.exists) {
                    allVideos.push({ ...vDoc.data(), fallbackThumb });
                }
            }
            renderVideos();
            if (allVideos.length > 3) document.getElementById('viewToggleBtn').classList.remove('hidden');
        }

        function renderVideos() {
            const list = document.getElementById('videoList');
            list.innerHTML = '';
            const limit = isShowingAll ? allVideos.length : 3;

            allVideos.slice(0, limit).forEach(v => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.innerHTML = `
                    <div class="thumb-box">
                        <img src="${v.Thumbnail || v.fallbackThumb}" alt="thumb">
                        <div class="duration">${v.Duration || '00:00'}</div>
                    </div>
                    <div class="video-info">${v.Title || v.Name}</div>
                    <div class="dl-icon">📥</div>
                `;
                list.appendChild(item);
            });
        }

        function toggleVideoView() {
            isShowingAll = !isShowingAll;
            document.getElementById('toggleText').innerText = isShowingAll ? "View less" : "View all";
            renderVideos();
        }

        function renderModules(modules) {
            const list = document.getElementById('modulesList');
            if (!modules) return;
            Object.entries(modules).forEach(([name, url]) => {
                const div = document.createElement('div');
                div.className = 'module-card';
                div.onclick = () => window.open(url, '_blank');
                div.innerHTML = `
                    <div class="icon-circle">📖</div>
                    <div class="module-text">${name}</div>
                    <div style="color:#999">🔗</div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
