<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Content</title>
    <style>
        :root { 
            --accent-pink: #FF1493; 
            --btn-blue: #E8F0FE;
            --text-blue: #1A73E8;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; padding: 0; background-color: #fff; color: #111;
            /* Subtle Grid Background from image */
            background-image: 
                linear-gradient(#f1f1f1 1px, transparent 1px),
                linear-gradient(90deg, #f1f1f1 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* --- HEADER SECTION --- */
        .header {
            background-color: #fff;
            position: relative;
            padding: 20px 20px 40px 20px;
            border-bottom: 4px solid var(--accent-pink);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            z-index: 10;
        }

        /* Faded Background Image in Header */
        .header-bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* Placeholder for your specific image */
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
        }

        .back-btn { font-size: 28px; cursor: pointer; color: #444; margin-bottom: 20px; display: inline-block; }

        .chapter-title { font-size: 26px; font-weight: 700; margin: 0; color: #202124; }
        .chapter-meta { font-size: 14px; color: #5f6368; margin-top: 5px; font-weight: 500; }

        /* --- CONTENT CONTAINER --- */
        .container { padding: 25px 20px; position: relative; z-index: 1; }

        .section-title { 
            font-size: 20px; font-weight: 700; margin: 20px 0; 
            display: inline-block; position: relative;
        }
        /* Yellow Underline from screenshot */
        .section-title::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 80%; height: 2px; background: #FFD700; opacity: 0.6;
        }

        /* --- VIDEOS LIST --- */
        .video-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 0; border-bottom: 1px solid #f0f0f0;
        }
        .thumb-container {
            position: relative; width: 130px; height: 80px; flex-shrink: 0;
        }
        .thumb-container img { 
            width: 100%; height: 100%; border-radius: 12px; object-fit: cover; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .duration-badge {
            position: absolute; bottom: 5px; left: 5px;
            background: rgba(0,0,0,0.7); color: white;
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
        }
        .video-text { flex-grow: 1; font-size: 15px; font-weight: 600; line-height: 1.4; color: #3c4043; }
        .download-btn { color: #5f6368; cursor: pointer; padding: 5px; }

        /* --- VIEW ALL BUTTON --- */
        .toggle-container { display: flex; justify-content: center; margin: 20px 0; }
        .view-toggle {
            background: var(--btn-blue); color: var(--text-blue);
            padding: 8px 18px; border-radius: 20px; font-weight: 600;
            display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;
        }

        /* --- STUDY MODULES --- */
        .module-card {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 20px;
            padding: 18px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 12px; transition: transform 0.2s;
        }
        .module-card:active { transform: scale(0.98); }
        .icon-circle {
            width: 45px; height: 45px; border-radius: 50%;
            background: #f8f9fa; display: flex; align-items: center; justify-content: center;
        }
        .module-title { flex-grow: 1; font-weight: 600; color: #202124; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .action-icons { display: flex; gap: 15px; color: #5f6368; }

        /* --- BOTTOM SWITCHER --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; border-radius: 50px; display: flex; padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100;
        }
        .nav-pill {
            padding: 12px 35px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer;
        }
        .nav-pill.active { background: #1a1a1a; color: #fff; }
        .nav-pill.inactive { color: #80868b; }

        #loading-screen { 
            position: fixed; inset: 0; background: white; z-index: 999;
            display: flex; align-items: center; justify-content: center; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-screen">Loading chapter...</div>

    <div id="main-content" class="hidden">
        <div class="header">
            <div class="header-bg-img"></div>
            <div class="back-btn" onclick="window.history.back()">←</div>
            <h1 class="chapter-title" id="chapterName">...</h1>
            <div class="chapter-meta" id="classSubject">Class ... • ...</div>
        </div>

        <div class="container">
            <h2 class="section-title">Concept Videos</h2>
            <div id="videoList"></div>

            <div class="toggle-container">
                <div id="toggleBtn" class="view-toggle hidden" onclick="toggleVideos()">
                    <span id="toggleText">View all</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>

            <h2 class="section-title">Study Modules</h2>
            <div id="modulesList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-pill active">Learn</div>
        <div class="nav-pill inactive">Practice</div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <script>
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        // Matches your requirement to read ?chapter=Name
        const targetChapter = (urlParams.get('chapter') || "").replace(/_/g, ' ');
        const batchId = localStorage.getItem("activeBatchId");

        let allVideosData = [];
        let isExpanded = false;

        window.onload = async () => {
            if (!targetChapter || !batchId) {
                alert("Chapter or Batch missing!");
                return;
            }

            try {
                // 1. Get Chapter Details
                const contentSnap = await db.collection("content")
                    .where("Id", "==", batchId)
                    .where("Name", "==", targetChapter)
                    .limit(1).get();

                if (contentSnap.empty) {
                    document.getElementById('loading-screen').innerText = "Content not found in database.";
                    return;
                }

                const data = contentSnap.docs[0].data();
                document.getElementById('chapterName').innerText = data.Name;

                // 2. Get Class from Batch collection
                const batchDoc = await db.collection("Batches").doc(batchId).get();
                const cls = batchDoc.exists ? batchDoc.data().Class : "7";
                document.getElementById('classSubject').innerText = `Class ${cls} ${data.Subject}`;

                // 3. Render Modules
                renderModules(data['Study Modules']);

                // 4. Fetch Videos (Matching misspelled 'Tittle' field)
                if (data.Videos && data.Videos.length > 0) {
                    for (const vId of data.Videos) {
                        const vDoc = await db.collection("Lectures").doc(vId).get();
                        if (vDoc.exists) {
                            allVideosData.push({ 
                                ...vDoc.data(), 
                                fallbackThumb: data.Thumbnail 
                            });
                        }
                    }
                    renderVideoUI();
                }

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

            } catch (e) {
                console.error(e);
                document.getElementById('loading-screen').innerText = "Error loading data.";
            }
        };

        function renderVideoUI() {
            const container = document.getElementById('videoList');
            container.innerHTML = '';
            
            const limit = isExpanded ? allVideosData.length : 3;
            const displayList = allVideosData.slice(0, limit);

            displayList.forEach(vid => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.innerHTML = `
                    <div class="thumb-container">
                        <img src="${vid.Thumbnail || vid.fallbackThumb}" alt="video">
                        <div class="duration-badge">${vid.Duration || '00:00'}</div>
                    </div>
                    <div class="video-text">${vid.Tittle || vid.Name}</div>
                    <div class="download-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </div>
                `;
                container.appendChild(item);
            });

            if (allVideosData.length > 3) {
                document.getElementById('toggleBtn').classList.remove('hidden');
                document.getElementById('toggleText').innerText = isExpanded ? "View less" : "View all";
            }
        }

        function toggleVideos() {
            isExpanded = !isExpanded;
            renderVideoUI();
        }

        function renderModules(modules) {
            const list = document.getElementById('modulesList');
            if (!modules) return;

            Object.entries(modules).forEach(([title, link]) => {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => window.open(link, '_blank');
                card.innerHTML = `
                    <div class="icon-circle">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <div class="module-title">${title}</div>
                    <div class="action-icons">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                `;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
