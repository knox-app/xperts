<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Reorder Chapters</title>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .card { background: #fff; max-width: 500px; margin: 0 auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        h2 { margin-top: 0; color: #333; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #666; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        button { background: #0066FF; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0052cc; }
        
        /* Draggable List Styling */
        #chapterList { margin-top: 20px; }
        .drag-item { 
            background: #fff; padding: 15px; margin-bottom: 8px; border: 1px solid #eee;
            border-radius: 10px; display: flex; align-items: center; cursor: grab;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .drag-item:active { cursor: grabbing; border-color: #0066FF; }
        .handle { margin-right: 15px; color: #ccc; font-size: 20px; user-select: none; }
        .chapter-name { flex-grow: 1; font-weight: 500; }
        
        .ghost { opacity: 0.4; background: #e0e7ff; border: 2px dashed #0066FF; }
        
        #saveBtn { background: #00C897; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <!-- Step 1: Login -->
    <div id="loginBox" class="card">
        <h2>Admin Login</h2>
        <input type="text" id="instId" placeholder="Institution ID">
        <input type="password" id="instPass" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- Step 2: Management -->
    <div id="adminBox" class="card hidden">
        <h2 id="instTitle">Loading...</h2>
        
        <label>Select Batch</label>
        <select id="batchSelect" onchange="loadChapters()"></select>

        <label>Select Subject</label>
        <select id="subSelect" onchange="loadChapters()">
            <option value="Biology">Biology</option>
            <option value="Physics">Physics</option>
            <option value="Math">Math</option>
            <option value="English">English</option>
        </select>

        <hr style="margin: 20px 0; border: 0.5px solid #eee;">
        
        <p style="font-size: 12px; color: #999; text-align: center;">Drag chapters up/down to reorder</p>
        <div id="chapterList"></div>
        
        <button id="saveBtn" onclick="saveNewOrder()">Save Sequence Order</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://knox-app.github.io/cloud/keys/xprtfb.js"></script>

    <script>
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let instId = "";

        async function login() {
            const id = document.getElementById('instId').value;
            const pass = document.getElementById('instPass').value;
            const doc = await db.collection("Institutes").doc(id).get();
            
            if(doc.exists && doc.data().Password === pass) {
                instId = id;
                document.getElementById('instTitle').innerText = doc.data()["Full Name"];
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminBox').classList.remove('hidden');
                fetchBatches();
            } else alert("Invalid Login");
        }

        async function fetchBatches() {
            const snap = await db.collection("Batches").where("Institution", "==", instId).get();
            const select = document.getElementById('batchSelect');
            snap.forEach(doc => {
                let opt = document.createElement('option');
                opt.value = doc.id; opt.innerText = doc.data()["Batch Name"];
                select.appendChild(opt);
            });
            loadChapters();
        }

        async function loadChapters() {
            const batch = document.getElementById('batchSelect').value;
            const sub = document.getElementById('subSelect').value;
            const list = document.getElementById('chapterList');
            const saveBtn = document.getElementById('saveBtn');
            
            list.innerHTML = "<p style='text-align:center;'>Loading chapters...</p>";
            saveBtn.style.display = "none";

            // Query chapters and sort by existing order
            const snap = await db.collection("content")
                .where("Id", "==", batch)
                .where("Subject", "==", sub)
                .get();

            let chapters = [];
            snap.forEach(doc => chapters.push({ id: doc.id, ...doc.data() }));
            
            // Sort locally in case index isn't ready
            chapters.sort((a, b) => (a.order || 0) - (b.order || 0));

            list.innerHTML = "";
            if(chapters.length > 0) saveBtn.style.display = "block";

            chapters.forEach(chap => {
                const div = document.createElement('div');
                div.className = "drag-item";
                div.setAttribute('data-id', chap.id);
                div.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="chapter-name">${chap.Name}</div>
                `;
                list.appendChild(div);
            });

            // Initialize Draggable List
            new Sortable(list, {
                animation: 150,
                ghostClass: 'ghost',
                handle: '.handle'
            });
        }

        async function saveNewOrder() {
            const listItems = document.querySelectorAll('.drag-item');
            const batch = document.getElementById('batchSelect').value;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Updating Database...";
            btn.disabled = true;

            const batchWrite = db.batch();
            listItems.forEach((item, index) => {
                const docId = item.getAttribute('data-id');
                const docRef = db.collection("content").doc(docId);
                batchWrite.update(docRef, { order: index });
            });

            await batchWrite.commit();
            btn.innerText = "Sequence Saved!";
            btn.disabled = false;
            setTimeout(() => btn.innerText = "Save Sequence Order", 2000);
        }
    </script>
</body>
</html>
